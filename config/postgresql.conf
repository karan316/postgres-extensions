# postgresql.conf — base configuration for postgres-extensions image
# This file is loaded via -c config_file=/etc/postgresql/postgresql.conf
# Dynamic extension settings are loaded from /etc/postgresql/conf.d/

# ---------------------------------------------------------------------------
# Connection
# ---------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100

# ---------------------------------------------------------------------------
# SSL / TLS
# ---------------------------------------------------------------------------
ssl = on
ssl_cert_file = '/var/lib/postgresql/ssl/server.crt'
ssl_key_file = '/var/lib/postgresql/ssl/server.key'
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
ssl_prefer_server_ciphers = on

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
shared_buffers = 128MB
dynamic_shared_memory_type = posix

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_timezone = 'UTC'

# ---------------------------------------------------------------------------
# Locale
# ---------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'

# ---------------------------------------------------------------------------
# Dynamic configuration (managed by entrypoint scripts)
# ---------------------------------------------------------------------------
include_dir = '/etc/postgresql/conf.d'
