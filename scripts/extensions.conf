# Extension registry — single source of truth
# Format: user_name:shared_preload_library:pg_extension_name
#   - user_name:           name used in EXTENSIONS env var
#   - shared_preload_library: library for shared_preload_libraries (empty = none)
#   - pg_extension_name:   name for CREATE EXTENSION (empty = same as user_name)
#
# To add a new extension:
#   1. Install it in the Dockerfile (APT or compile from source)
#   2. Add a line here
#   3. Rebuild the image

